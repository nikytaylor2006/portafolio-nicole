<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi página web</title>

  <!-- CSS propio -->
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Header -->
<header>
  <img src="portafolio portada-Recuperado.jpg" class="img-fluid w-100" alt="portada">
</header>

<br>

<!-- Acordeón -->
<section class="container my-5">
  <div class="accordion accordion-flush" id="accordionFlushExample">

    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#uno">
          Acerca de
        </button>
      </h2>
      <div id="uno" class="accordion-collapse collapse">
        <div class="accordion-body">
          Esta es una página dedicada a dar a conocer mis capacidades como artista y diseñadora gráfica.
        </div>
      </div>
    </div>

    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#dos">
          Quién soy
        </button>
      </h2>
      <div id="dos" class="accordion-collapse collapse">
        <div class="accordion-body">
          Yo soy Nicole Taylor...
        </div>
      </div>
    </div>

  </div>
</section>

<!-- CARRUSEL 1 -->
<section class="trabajos">
  <div id="carouselPintura" class="carousel slide">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="portadas pintura web.jpg" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="portadas pintura web.jpg" class="d-block w-100">
      </div>
    </div>
  </div>
</section>

<!-- CARRUSEL 2 -->
<section class="trabajos">
  <div id="carouselMurales" class="carousel slide">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="mural portada web.jpg" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="mural portada web.jpg" class="d-block w-100">
      </div>
    </div>
  </div>
</section>

<!-- CARRUSEL 3 -->
<section class="trabajos">
  <div id="carouselDigital" class="carousel slide">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="portada digital web.jpg" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="portada digital web.jpg" class="d-block w-100">
      </div>
    </div>
  </div>
</section>

<!-- CARRUSEL 4 -->
<section class="trabajos">
  <div id="carouselTattoo" class="carousel slide">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="portada tattoo web.jpg" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="portada tattoo web.jpg" class="d-block w-100">
      </div>
    </div>
  </div>
</section>

<!-- Botones -->
<section class="text-center my-5">
  <button class="btn btn-primary btn-lg">Contacto</button>
</section>

<!-- Footer -->
<footer class="text-center p-4">
  <p>Derechos reservados 2026</p>
  <p>Nicole Beltrán Taylor</p>
</footer>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
